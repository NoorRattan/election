name: Deploy

on:
  push:
    branches: [main]

jobs:
  # Run backend tests first  -  deployment is blocked if they fail
  backend-test:
    uses: ./.github/workflows/backend-test.yml

  deploy-backend:
    needs: backend-test
    runs-on: ubuntu-latest
    env:
      CAN_DEPLOY_BACKEND: ${{ secrets.GCP_SA_KEY != '' && secrets.GCP_PROJECT_ID != '' && secrets.GCP_PROJECT_ID_NUMBER != '' && secrets.VITE_API_BASE_URL != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Skip backend deployment when cloud secrets are absent
        if: env.CAN_DEPLOY_BACKEND != 'true'
        run: echo "Cloud Run deployment skipped because required GitHub secrets are not configured for this repository."

      - uses: google-github-actions/auth@v2
        if: env.CAN_DEPLOY_BACKEND == 'true'
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2
        if: env.CAN_DEPLOY_BACKEND == 'true'

      - name: Build and push Docker image via Cloud Build
        if: env.CAN_DEPLOY_BACKEND == 'true'
        run: |
          gcloud builds submit backend/ \
            --tag gcr.io/${{ secrets.GCP_PROJECT_ID }}/electra-api \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Grant Secret Manager access to compute SA
        if: env.CAN_DEPLOY_BACKEND == 'true'
        run: |
          gcloud projects add-iam-policy-binding ${{ secrets.GCP_PROJECT_ID }} \
            --member="serviceAccount:${{ secrets.GCP_PROJECT_ID_NUMBER }}-compute@developer.gserviceaccount.com" \
            --role="roles/secretmanager.secretAccessor" \
            --condition=None \
            --project ${{ secrets.GCP_PROJECT_ID }} || true

      - name: Deploy to Cloud Run
        if: env.CAN_DEPLOY_BACKEND == 'true'
        run: |
          gcloud run deploy electra-api \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/electra-api \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated \
            --memory 512Mi \
            --max-instances 10 \
            --set-env-vars "ENVIRONMENT=production,GOOGLE_CLOUD_PROJECT=${{ secrets.GCP_PROJECT_ID }},ALLOWED_ORIGINS=https://electra-app-2026.web.app\,https://electra-app-2026.firebaseapp.com,FIREBASE_SERVICE_ACCOUNT_KEY=" \
            --project ${{ secrets.GCP_PROJECT_ID }}

      # Smoke test runs after Cloud Run deploy to verify the container starts
      # correctly and handles real HTTP requests. Catches bad env vars or import
      # errors that pass build but fail at runtime.
      # Note: smoke-test.sh normalises the URL  -  strips /api/v1 if already present.
      - name: Post-deploy smoke test
        if: env.CAN_DEPLOY_BACKEND == 'true'
        run: bash scripts/smoke-test.sh
        env:
          API_URL: ${{ secrets.VITE_API_BASE_URL }}

  deploy-frontend:
    needs: deploy-backend
    runs-on: ubuntu-latest
    env:
      CAN_DEPLOY_FRONTEND: ${{ secrets.FIREBASE_SERVICE_ACCOUNT != '' && secrets.GCP_PROJECT_ID != '' && secrets.VITE_API_BASE_URL != '' && secrets.VITE_FIREBASE_API_KEY != '' && secrets.VITE_FIREBASE_AUTH_DOMAIN != '' && secrets.VITE_FIREBASE_PROJECT_ID != '' && secrets.VITE_FIREBASE_STORAGE_BUCKET != '' && secrets.VITE_FIREBASE_MESSAGING_SENDER_ID != '' && secrets.VITE_FIREBASE_APP_ID != '' && secrets.VITE_FIREBASE_MEASUREMENT_ID != '' && secrets.VITE_GOOGLE_MAPS_API_KEY != '' }}
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Skip frontend deployment when hosting secrets are absent
        if: env.CAN_DEPLOY_FRONTEND != 'true'
        run: echo "Firebase Hosting deployment skipped because required GitHub secrets are not configured for this repository."

      - uses: actions/setup-node@v4
        if: env.CAN_DEPLOY_FRONTEND == 'true'
        with:
          node-version: '20.19.0'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        if: env.CAN_DEPLOY_FRONTEND == 'true'
        run: npm ci

      # Security: fail CI if any moderate or higher npm vulnerability is found.
      # Run 'npm audit fix' locally to resolve before merging.
      - name: Security audit
        if: env.CAN_DEPLOY_FRONTEND == 'true'
        run: npm audit --audit-level=moderate

      # Secret scanning: fail CI if any secret is found in the git history.
      - name: Scan for secrets (gitleaks)
        if: env.CAN_DEPLOY_FRONTEND == 'true'
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ESLint runs before the production build. jsx-a11y accessibility rule
      # violations fail CI immediately rather than shipping broken markup.
      - name: Lint frontend
        if: env.CAN_DEPLOY_FRONTEND == 'true'
        run: npm run lint

      - name: Build production bundle
        if: env.CAN_DEPLOY_FRONTEND == 'true'
        env:
          VITE_API_BASE_URL:                  ${{ secrets.VITE_API_BASE_URL }}
          VITE_FIREBASE_API_KEY:              ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:          ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID:           ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET:       ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID:  ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID:               ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID:       ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_GOOGLE_MAPS_API_KEY:           ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
        run: npm run build

      # Coverage thresholds are enforced in vite.config.js (lines/statements >=70%, branches >=60%).
      # This step fails CI if any threshold is not met, preventing regressions.
      - name: Run frontend tests with coverage
        if: env.CAN_DEPLOY_FRONTEND == 'true'
        run: npm run test:coverage

      # Pinned to @v0.9.0 (exact version) to prevent upstream breaking changes
      # from silently breaking deployments on a floating @v0 reference.
      - uses: FirebaseExtended/action-hosting-deploy@v0.9.0
        if: env.CAN_DEPLOY_FRONTEND == 'true'
        with:
          repoToken:              ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId:              ${{ secrets.GCP_PROJECT_ID }}
          channelId:              live
