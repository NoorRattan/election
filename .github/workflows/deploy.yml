name: Deploy

on:
  push:
    branches: [main]

jobs:
  # Run backend tests first — deployment is blocked if they fail
  backend-test:
    uses: ./.github/workflows/backend-test.yml

  deploy-backend:
    needs: backend-test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build and push Docker image via Cloud Build
        run: |
          gcloud builds submit backend/ \
            --tag gcr.io/${{ secrets.GCP_PROJECT_ID }}/electra-api \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy electra-api \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/electra-api \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated \
            --memory 512Mi \
            --max-instances 10 \
            --set-env-vars ENVIRONMENT=production,GOOGLE_CLOUD_PROJECT=${{ secrets.GCP_PROJECT_ID }} \
            --project ${{ secrets.GCP_PROJECT_ID }}

      # UPDATED (Prompt 09 — GAP-06): Post-deploy smoke test added.
      # Runs AFTER Cloud Run deploy. If the container starts but fails to handle requests
      # (bad env var, import error, etc.), this step catches it and fails the workflow.
      # VITE_API_BASE_URL is already a GitHub Secret (used in the frontend build step).
      # Note: smoke-test.sh normalises the URL — strips trailing /api/v1 if present,
      #       then appends its own paths. Handles both https://host/api/v1 and https://host.
      - name: Post-deploy smoke test
        run: bash scripts/smoke-test.sh
        env:
          API_URL: ${{ secrets.VITE_API_BASE_URL }}

  deploy-frontend:
    needs: deploy-backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # UPDATED (Prompt 09 — GAP-05): Frontend ESLint step added before build.
      # Runs BEFORE build so that jsx-a11y accessibility violations fail fast.
      # Warnings do not fail CI — only errors do.
      - name: Lint frontend
        run: npm run lint

      - name: Build production bundle
        env:
          VITE_API_BASE_URL:                  ${{ secrets.VITE_API_BASE_URL }}
          VITE_FIREBASE_API_KEY:              ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:          ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID:           ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET:       ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID:  ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID:               ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID:       ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_GOOGLE_MAPS_API_KEY:           ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
        run: npm run build

      # FIX #19: Frontend coverage enforced in CI (was missing before audit)
      - name: Run frontend tests with coverage
        run: npm run test:coverage

      # FIX #18: Pinned to @v0.9.0 — NOT floating @v0 which can break on upstream changes
      - uses: FirebaseExtended/action-hosting-deploy@v0.9.0
        with:
          repoToken:              ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId:              ${{ secrets.GCP_PROJECT_ID }}
          channelId:              live
