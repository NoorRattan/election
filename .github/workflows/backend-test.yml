name: Backend Tests

on:
  workflow_call:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    # working-directory scopes all steps to the backend folder so that
    # pip install finds requirements-dev.txt without a path prefix.
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      # Lint runs before tests so that syntax/style errors fail fast.
      # --output-format=github formats violations as inline PR annotations.
      # ruff format --check validates formatting without modifying files.
      - name: Lint with ruff
        run: |
          ruff check app/ tests/ --output-format=github
          ruff format app/ tests/ --check

      - name: Run tests with coverage
        env:
          GOOGLE_CLOUD_PROJECT: test-project
          ENVIRONMENT: test
          FIREBASE_SERVICE_ACCOUNT_KEY: nonexistent.json
          ALLOWED_ORIGINS: http://localhost:5173
          SECRET_KEY: test-secret-key-32-characters-minimum-x
          DIALOGFLOW_AGENT_ID: ""
          RATE_LIMIT_PER_MINUTE: "120"
        run: pytest tests/ --cov=app --cov-report=term-missing --cov-fail-under=80
