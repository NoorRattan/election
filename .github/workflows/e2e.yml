name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# E2E tests run against a built frontend with mocked APIs.
# A real backend is NOT required  -  all API calls are intercepted via page.route().

jobs:
  e2e:
    name: Playwright E2E (Chromium)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      # -- Checkout ----------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -- Node setup --------------------------------------------------------
      - name: Set up Node.js 20.19
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # -- Install dependencies -----------------------------------------------
      - name: Install npm dependencies
        run: npm ci

      # -- Install Playwright browsers (Chromium only for CI speed) ----------
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # -- Build frontend with real Firebase credentials ---------------------
      # Real Firebase credentials are required so the Firebase SDK initialises
      # correctly and the app renders. Auth returns null user (unauthenticated),
      # which is exactly what the E2E specs test against.
      # All /api/v1/* calls are still mocked via page.route()  -  no real backend needed.
      - name: Build frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: /api/v1
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY || 'dummy-api-key' }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN || 'dummy-auth-domain' }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID || 'dummy-project-id' }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET || 'dummy-storage-bucket' }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID || 'dummy-sender-id' }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID || '1:1234567890:web:dummy' }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID || 'G-DUMMY' }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY || 'dummy-maps-key' }}


      # -- Run E2E Tests (Server & Playwright in same step) -------------------
      # The server must be started in the SAME step as Playwright, otherwise
      # GitHub Actions kills the background process between steps, causing
      # Playwright to timeout on every single test (resulting in a 37+ min run).
      - name: Run E2E Tests
        run: |
          # 1. Start preview server in background
          npx vite preview --port 5173 &
          
          # 2. Wait for server to be ready
          echo "Waiting for server to start..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5173 > /dev/null 2>&1; then
              echo "OK Preview server is up!"
              break
            fi
            sleep 2
          done
          
          # 3. Run tests (Chromium only in CI)
          npx playwright test --project=chromium
        env:
          VITE_API_BASE_URL: /api/v1
          PLAYWRIGHT_BASE_URL: http://localhost:5173
          CI: true
          PLAYWRIGHT_SKIP_SERVER_STARTUP: true

      # -- Upload test report (even on failure) ------------------------------
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
