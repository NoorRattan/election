name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# E2E tests run against a built frontend with mocked APIs.
# A real backend is NOT required — all API calls are intercepted via page.route().

jobs:
  e2e:
    name: Playwright E2E (Chromium)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node setup ────────────────────────────────────────────────────────
      - name: Set up Node.js 20.19
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # ── Install dependencies ───────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      # ── Install Playwright browsers (Chromium only for CI speed) ──────────
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # ── Build frontend with real Firebase credentials ─────────────────────
      # Real Firebase credentials are required so the Firebase SDK initialises
      # correctly and the app renders. Auth returns null user (unauthenticated),
      # which is exactly what the E2E specs test against.
      # All /api/v1/* calls are still mocked via page.route() — no real backend needed.
      - name: Build frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: /api/v1
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}


      # ── Start preview server in background ─────────────────────────────────
      # Playwright's webServer block would also start this, but having CI manage
      # it explicitly avoids the timeout loop caused by Playwright spawning and
      # waiting for the process internally.
      - name: Start Vite preview server
        run: npx vite preview --port 5173 &
        env:
          VITE_API_BASE_URL: /api/v1

      # ── Wait until the preview server is accepting connections ────────────────
      - name: Wait for preview server
        run: npx wait-on http://localhost:5173 --timeout 60000

      # ── Run E2E tests (Chromium only in CI) ───────────────────────────────
      # Firefox and mobile Safari run locally only (npm run e2e) to keep CI fast.
      - name: Run Playwright tests
        run: npx playwright test --project=chromium
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:5173
          CI: true
          # Tell Playwright the server is already running — skip webServer block
          PLAYWRIGHT_SKIP_SERVER_STARTUP: true

      # ── Upload test report (even on failure) ──────────────────────────────
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
