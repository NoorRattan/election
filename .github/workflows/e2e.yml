name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# E2E tests run against a built frontend with mocked APIs.
# A real backend is NOT required — all API calls are intercepted via page.route().

jobs:
  e2e:
    name: Playwright E2E (Chromium)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node setup ────────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # ── Install dependencies ───────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      # ── Install Playwright browsers (Chromium only for CI speed) ──────────
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # ── Build frontend with placeholder env vars ───────────────────────────
      # Real secrets are NOT needed — all API calls are mocked in tests.
      - name: Build frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: http://localhost:8000/api/v1
          VITE_FIREBASE_API_KEY: test-key
          VITE_FIREBASE_AUTH_DOMAIN: test.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: test-project
          VITE_FIREBASE_STORAGE_BUCKET: test-project.appspot.com
          VITE_FIREBASE_MESSAGING_SENDER_ID: '000000000000'
          VITE_FIREBASE_APP_ID: '1:000000000000:web:000000'
          VITE_FIREBASE_MEASUREMENT_ID: G-TEST00000
          VITE_GOOGLE_MAPS_API_KEY: test-maps-key

      # ── Serve built frontend in background ─────────────────────────────────
      - name: Serve built frontend
        run: npx serve dist -p 5173 &

      # ── Wait for server to be ready ────────────────────────────────────────
      - name: Wait for frontend to be ready
        run: npx wait-on http://localhost:5173 --timeout 30000

      # ── Run E2E tests (Chromium only in CI) ───────────────────────────────
      # Firefox and mobile Safari run locally only (npm run e2e) to keep CI fast.
      - name: Run Playwright tests
        run: npx playwright test --project=chromium
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:5173
          CI: true

      # ── Upload test report (even on failure) ──────────────────────────────
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
