<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Electra — Learn how elections work in the UK, USA, and India. Interactive civic education for first-time voters and students." />

    <!--
      Content Security Policy.
      Maps script loaded dynamically by PollingMap.jsx — NOT from this file.
      Analytics loaded lazily after consent.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self' https://maps.googleapis.com https://www.googletagmanager.com;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com;
        connect-src 'self' https://electra-api-368835973060.us-central1.run.app https://*.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com;
        img-src 'self' data: https://maps.gstatic.com https://maps.googleapis.com;
        frame-src 'none';
      "
    />

    <!-- Inter typeface — loaded from Google Fonts for consistent cross-platform rendering -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Favicon (inline SVG ballot box — no binary asset committed) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <title>Electra — Election Education Assistant</title>

    <!--
      NOTE: Google Maps JS API is NOT loaded here.
      PollingMap.jsx loads it dynamically on demand via a script tag injection,
      checking window.google first to avoid double-loading.
      This keeps the initial bundle free of Maps JS weight for pages that don't use the map.
    -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
