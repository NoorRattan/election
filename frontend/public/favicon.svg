<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Electra ballot box icon">
  <!-- Ballot box body -->
  <rect x="4" y="14" width="24" height="14" rx="2" ry="2" fill="#2563eb"/>
  <!-- Ballot slot -->
  <rect x="12" y="11" width="8" height="3" rx="1" ry="1" fill="#1d4ed8"/>
  <!-- Ballot paper being inserted -->
  <rect x="14" y="4" width="4" height="9" rx="1" ry="1" fill="#ffffff" stroke="#2563eb" stroke-width="0.5"/>
  <!-- Check mark on ballot paper -->
  <polyline points="15,7 16,9 18,6" fill="none" stroke="#2563eb" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Base highlight -->
  <rect x="4" y="24" width="24" height="4" fill="#1d4ed8"/>
</svg>
